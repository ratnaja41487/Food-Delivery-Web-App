<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Cafe Connect</title>
<link rel="stylesheet" href="css/admin1.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<h2>Cafe Connect</h2>

<div class="nav-links">

<a href="admin.html">Orders</a>


<button onclick="logout()" class="logout">Logout</button>
</div>

</div>


<h1 class="title">Admin Dashboard</h1>


<!-- DASHBOARD CARDS -->
<div class="stats">

<div class="card orange">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>

<div class="card green">
<h3>Total Revenue</h3>
<p id="totalRevenue">₹0</p>
</div>

<div class="card purple">
<h3>Total Users</h3>
<p id="totalUsers">0</p>
</div>

<div class="card red">
<h3>Pending Orders</h3>
<p id="pendingOrders">0</p>
</div>

</div>


<div class="dashboard-container">


<!-- RECENT ORDERS -->
<div class="orders">

<div class="orders-header">
<h2>Recent Orders</h2>
</div>

<table id="ordersTable">

<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Status</th>
</tr>

</table>

</div>

</div>

</div>



<script>


function logout(){
alert("Logged out successfully");
window.location.href="login.html";
}

function addItem(){
window.location.href="manage-menu.html";
}

function viewItems(){
window.location.href="manage-menu.html";
}

</script>

<!-- ADMIN SCRIPT -->
<script src="js/admin1.js"></script>

</body>
</html>
